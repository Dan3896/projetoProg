worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use                epoll;
    multi_accept       on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Formato de log customizado para mostrar qual nó (upstream) respondeu
    log_format distributed
        '$remote_addr - [$time_local] "$request" '
        '$status $body_bytes_sent '
        'upstream="$upstream_addr" rt=$request_time';

    access_log /var/log/nginx/access.log distributed;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── CLUSTER YOURLS (Load Balancing) ──
    upstream yourls_cluster {
        # Distribui para o nó com menos conexões ativas
        least_conn;

        # Define os nós e a tolerância a falhas (3 falhas em 30s tira o nó do ar temporariamente)
        server yourls1:80 max_fails=3 fail_timeout=30s;
        server yourls2:80 max_fails=3 fail_timeout=30s;
        server yourls3:80 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    server {
        listen      80;
        server_name _;

        # ── Health-check do Load Balancer ──
        location /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"yourls-nginx-lb","nodes":3}';
        }

        # ── Proxy Reverso e Failover ──
        location / {
            proxy_pass         http://yourls_cluster;
            proxy_http_version 1.1;

            # Repassa os IPs e cabeçalhos reais para o YOURLS não se perder
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Se o nó selecionado der erro ou demorar, tenta o próximo nó silenciosamente
            proxy_next_upstream       error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }
    }
}